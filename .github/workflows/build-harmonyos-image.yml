name: Build HarmonyOS OCI image

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-harmonyos-image.yml'
      - 'images/harmonyos/**'
  workflow_dispatch:
    inputs:
      version:
        description: DevEco command-line tools version / image tag
        required: true
        default: 6.1.0.830
      image_name:
        description: GHCR image name
        required: true
        default: harmonyos-build-env
      api_tag:
        description: Additional moving tag for the SDK/API line
        required: true
        default: 6.1-api23
      sdk_asset:
        description: Release asset containing command-line-tools as tar.zst
        required: true
        default: command-line-tools-6.1.0.830.tar.zst

permissions:
  contents: read
  packages: write

env:
  VERSION: ${{ github.event.inputs.version || '6.1.0.830' }}
  IMAGE_NAME: ${{ github.event.inputs.image_name || 'harmonyos-build-env' }}
  API_TAG: ${{ github.event.inputs.api_tag || '6.1-api23' }}
  SDK_ASSET: ${{ github.event.inputs.sdk_asset || 'command-line-tools-6.1.0.830.tar.zst' }}

jobs:
  build:
    name: Build and publish HarmonyOS image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout image definitions
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          docker system prune -af || true
          df -h

      - name: Install archive tooling
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends zstd

      - name: Download command-line tools release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/harmonyos-sdk build/context
          gh release download "$VERSION" \
            --repo "${{ github.repository }}" \
            --pattern "$SDK_ASSET" \
            --dir /tmp/harmonyos-sdk
          tar --zstd -xf "/tmp/harmonyos-sdk/$SDK_ASSET" -C build/context
          test -d build/context/command-line-tools

      - name: Prepare Docker context
        run: cp images/harmonyos/Dockerfile build/context/Dockerfile

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: build/context
          file: build/context/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.API_TAG }}
          build-args: |
            IMAGE_DESCRIPTION=HarmonyOS command-line build environment ${{ env.VERSION }}
